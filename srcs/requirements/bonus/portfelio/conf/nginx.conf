server {
	listen 8081 ssl;
	listen [::]:8081 ssl;
	server_name ybounite.42.fr;

	# SSL settings
	ssl_protocols TLSv1.3;
	ssl_certificate      /etc/nginx/ssl/nginx.crt;
	ssl_certificate_key  /etc/nginx/ssl/nginx.key;

    root /var/www/html;
    index index.php index.html;

	location / {
		root /var/www/html;
		index index.php index.html;
	}

	location /static {
		root /var/www/wordpress;
		index index.html;
	}

}
