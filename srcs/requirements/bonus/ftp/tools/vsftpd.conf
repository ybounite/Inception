# Run in standalone mode
listen=YES
listen_port=21

# Disable anonymous access
anonymous_enable=NO
local_enable=YES

# Allow write operations
write_enable=YES
local_umask=022

# Use local system users (created inside the container)
nopriv_user=nobody

# Point to the WordPress files
local_root=/var/www/html

# Chroot local users to their home (here local_root)
chroot_local_user=YES
allow_writeable_chroot=YES

# Passive mode configuration
pasv_enable=YES
pasv_min_port=10000
pasv_max_port=10100

# Logging
xferlog_enable=YES
log_ftp_protocol=YES