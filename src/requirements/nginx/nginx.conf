worker_processes 1;

events {
	worker_connections 1024;
}

http {
	server {
		listen	80;
		server_name localhost;
		location / {
			root /usr/share/nginx/html;
			index index.html;
		}

		#listen 443 ssl;
		# SSL configuration

		# Only allow TLSv1.2 and TLSv1.3

		# SSL session settings

		# Root directory and other  settings
		#root /usr/share/nginx.html
		#index index.html index.html;
	}
}